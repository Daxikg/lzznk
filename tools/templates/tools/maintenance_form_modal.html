{% load static %}

<div class="modal fade" id="maintenanceModal" tabindex="-1" aria-labelledby="maintenanceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="maintenanceModalLabel">
                    <i class="fa fa-cogs mr-2"></i>创建保养记录 - {{ tool.code }} - {{ tool.name }}
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="maintenanceForm" method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- 第一行：保养类型和日期 -->
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>保养类型 <span class="text-danger">*</span></label>
                            <select name="maintenance_type" class="form-control" required>
                                <option value="">请选择</option>
                                {% for value, label in form.maintenance_type.field.choices %}
                                    <option value="{{ value }}" {% if form.maintenance_type.value == value %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group col-md-6">
                            <label>保养日期 <span class="text-danger">*</span></label>
                            <input type="date" name="date" class="form-control"
                                   value="{% if form.date.value %}{{ form.date.value|date:'Y-m-d' }}{% else %}{{ today|date:'Y-m-d' }}{% endif %}"
                                   required>
                        </div>
                    </div>

                    <!-- 保养内容 -->
                    <div class="form-group">
                        <label>保养内容 <span class="text-danger">*</span></label>
                        <textarea name="content" class="form-control" rows="3"
                                  placeholder="请输入保养内容..." required>{% if form.content.value %}{{ form.content.value }}{% endif %}</textarea>
                    </div>

                    <!-- 保养结果 -->
                    <div class="form-group">
                        <label>保养结果 <span class="text-danger">*</span></label>
                        <textarea name="result" class="form-control" rows="3"
                                  placeholder="请输入保养结果..." required>{% if form.result.value %}{{ form.result.value }}{% endif %}</textarea>
                    </div>

                    <!-- 相关图片 -->
                    <div class="form-group mb-0">
                        <label>相关图片</label>
                        <input type="file" name="images" class="form-control-file" multiple accept="image/*">
                        <small class="text-muted">可选择多张图片</small>
                    </div>

                    <input type="hidden" name="tool_id" value="{{ tool_id }}">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                <button type="submit" form="maintenanceForm" class="btn btn-success">
                    <i class="fa fa-check mr-1"></i>保存保养记录
                </button>
            </div>
        </div>
    </div>
</div>
