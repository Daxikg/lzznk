{% extends 'base3.html' %}
{% load static %}

{% block content %}
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h1>新建事务详情</h1>
                    </div>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.media }}
                        {{ form.as_p }}
                        <div class="form-group">
                            <label>附件（在文件选择框按住Ctrl可同时添加多个文件）:</label>
                            <input type="file" name="attachments" multiple class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary me-2">发布</button>
                        <a href="/1/" class="btn btn-info">返回</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <style>
        .ck-content .math { /* 公式渲染样式 */
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
    </style>
{% endblock %}
