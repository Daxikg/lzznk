{% extends 'base3.html' %}
{% load static %}

{% block content %}
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-body">
                        <h1>编辑事务详情</h1>
                    </div>
                    <div class="card-body">
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            {{ form.media }}
                            {{ form.as_p }}
                            {% for attachment in attachments %}
                                <input type="checkbox" name="attachments_to_delete" value="{{ attachment.id }}">
                                勾选删除：
                                <a href="{{ attachment.file.url }}" target="_blank">{{ attachment.file }}</a>
                                <br>
                                <br>
                            {% endfor %}
                            <div class="form-group">
                                <label>附件（可多选）:</label>
                                <input type="file" name="attachments" multiple class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary me-2">保存</button>
                            <a href="/transaction/{{ id }}/" class="btn btn-info">返回详情页</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <style>
        .ck-content .math { /* 公式渲染样式 */
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }
    </style>
{% endblock %}
