{% extends 'base11.html' %}
{% load static %}

{% block content %}
    <div class="row">
        <div class="col-md-3">
            <div class="container-fluid page-body-wrapper">
                <div class="main-panel">
                    <div class="content-wrapper">
                        <h1>{{ equipment.get_device_display }} - 点检步骤1/2</h1>
                        <label>负责人：{{ equipment.user.name }}；</label>
                        <label>班组：{{ equipment.get_banzu_display }}；</label>
                        <label>编号：{% if equipment.number %}{{ equipment.number }}{% else %}{% endif %}</label>
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
{#                            <div class="form-group">#}
{#                                <h4>选择操作者：</h4>#}
{#                                <select name="operater" class="form-control" required>#}
{#                                    {% for op in operaters %}#}
{#                                        <option value="{{ op.id }}">{{ op.name }} ({{ op.get_banzu_display }})</option>#}
{#                                    {% endfor %}#}
{#                                </select>#}
{#                            </div>#}
                            <h4>检查项目（请勾选正常项）：</h4>
                            {% for item in check_items %}
                                <div class="form-check">
                                    <input class="form-check-input check-item" type="checkbox" name="checks"
                                           value="{{ item.num }}">
                                    <label class="form-check-label">
                                        {{ item.num }}. {{ item.name }}
                                    </label>
                                </div>
                            {% endfor %}
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="select-all"/>
                                <label class="form-check-label">全选</label>
                            </div>
                            <div class="form-group">
                                <label for="beizhu">备注：</label>
                                <textarea name="beizhu" class="form-control" rows="4"></textarea>
                            </div>
                            <h5>上传点检照片：</h5>
                            <div class="form-group">
                                <input type="file" name="pic1" class="form-control-file" accept="image/*"
                                       capture="environment" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm custom-button">下一步</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
