{% load static %}
<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'assets/images/favicon.png' %}">
    <title>点检</title>
    <link href="{% static 'dist/css/style.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/libs/toastr/build/toastr.min.css' %}" rel="stylesheet">
    <style>
        th, td {
            align-items: center; /* 垂直居中对齐 */
            justify-content: center; /* 水平居中对齐 */
            font-weight: bold;
        }

        .image-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }

    </style>
</head>
<body>

<div id="main-wrapper">
    <div class="container-fluid">
        <div class="row">
            {% block content %}

            {% endblock %}
            <footer class="footer">
                Copyright &copy; 2024.GYNCLD All rights reserved.
            </footer>
        </div>
    </div>
</div>

{% block js %}
{% endblock %}
<script src="{% static 'assets/libs/jquery/dist/jquery.min.js' %}"></script>
<script src="{% static 'assets/libs/bootstrap/dist/js/bootstrap.min.js' %}"></script>
<script src="{% static 'dist/js/custom.min.js' %}"></script>
<script src="{% static 'dist/js/pages/chart/chart-page-init.js' %}"></script>
<script>
    {#全选框#}
    document.getElementById('select-all').addEventListener('change', function(e) {
        var isChecked = e.target.checked;
        var items = document.getElementsByClassName('check-item');
        for(var i = 0; i < items.length; i++) {
            items[i].checked = isChecked;
        }
    });
</script>
</body>
</html>
