{% extends 'djgl1.html' %}
{% load my_tags %}
{% block content %}
    <section class="showcase ptb-50 bg-danger">
        <div class="container">
            <div class="page-title">
                <h3 class="text-center text-white">{{ banzu_display }}介绍、工作指示编辑</h3>
            </div>
        </div>
    </section>

    <section class="blog pt-50 pb-50 bg-light">
        <div class="container">
            <div class="row">
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.media }}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-danger me-2">保存</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
